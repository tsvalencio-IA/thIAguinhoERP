<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>thIAguinho — Carregando...</title>
  <style>
    body{margin:0;background:#0a0e1a;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .loader{text-align:center;}
    .spin{width:60px;height:60px;border:4px solid #1a2236;border-top-color:#00D4FF;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 20px;}
    @keyframes s{to{transform:rotate(360deg);}}
    h1{font-size:1.5rem;font-weight:300;letter-spacing:2px;color:#00D4FF;margin:0 0 10px;}
    p{color:#7a9ab8;font-size:0.85rem;margin:0;}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spin"></div>
    <h1>thIAguinho</h1>
    <p>Conectando ao sistema...</p>
  </div>
  <script>
    setTimeout(function(){ window.location.href = 'selecionar-perfil.html'; }, 500);
  </script>
</body>
</html>
